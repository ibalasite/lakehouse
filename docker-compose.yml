version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Local Data Lakehouse Stack
# Services: MinIO · Apache Polaris · Trino · MySQL · PostgreSQL · Airflow · Metabase
# ─────────────────────────────────────────────────────────────────────────────

networks:
  lakehouse-net:
    driver: bridge

volumes:
  minio-data:
  mysql-data:
  postgres-data:
  metabase-data:

services:

  # ── Object storage (S3-compatible) ────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── MinIO bucket initialisation (one-shot) ─────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "mc alias set minio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
          mc mb --ignore-existing minio/lakehouse &&
          mc mb --ignore-existing minio/lakehouse/raw &&
          mc mb --ignore-existing minio/lakehouse/bronze &&
          mc mb --ignore-existing minio/lakehouse/silver &&
          mc mb --ignore-existing minio/lakehouse/gold &&
          mc anonymous set none minio/lakehouse &&
          echo 'MinIO buckets initialised.'"
    networks:
      - lakehouse-net
    restart: "no"

  # ── Apache Polaris (Iceberg REST catalog) ─────────────────────────────────
  polaris:
    image: apache/polaris:latest
    container_name: polaris
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${POLARIS_PORT:-8181}:8181"
      - "${POLARIS_MGMT_PORT:-8182}:8182"
    environment:
      POLARIS_REALM: ${POLARIS_REALM:-POLARIS}
      POLARIS_BOOTSTRAP_CREDENTIALS: "${POLARIS_REALM:-POLARIS},${POLARIS_CLIENT_ID},${POLARIS_CLIENT_SECRET}"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      POLARIS_IO_S3_ENDPOINT: http://minio:9000
      POLARIS_IO_S3_PATH_STYLE_ACCESS: "true"
      quarkus.http.port: "8181"
      polaris.persistence.type: in-memory
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/q/health"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 45s
    restart: unless-stopped

  # ── Trino (query engine) ──────────────────────────────────────────────────
  trino:
    image: trinodb/trino:443
    container_name: trino
    depends_on:
      polaris:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "${TRINO_PORT:-8080}:8080"
    volumes:
      - ./platform/trino/etc:/etc/trino
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    restart: unless-stopped

  # ── MySQL (Metabase backing store + cache tables) ─────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./platform/init/03_mysql_init.sql:/docker-entrypoint-initdb.d/03_mysql_init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── PostgreSQL (Airflow metadata database) ────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── Airflow DB init + admin user creation (one-shot) ─────────────────────
  airflow-init:
    image: apache/airflow:2.9.3
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    command: >
      bash -c "
        pip install --quiet apache-airflow-providers-trino apache-airflow-providers-mysql &&
        airflow db upgrade &&
        airflow users create \
          --username '${AIRFLOW_ADMIN_USER}' \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@local.com \
          --password '${AIRFLOW_ADMIN_PASSWORD}' || true
      "
    networks:
      - lakehouse-net
    restart: "no"

  # ── Airflow scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    command: >
      bash -c "
        pip install --quiet apache-airflow-providers-trino apache-airflow-providers-mysql dbt-trino &&
        airflow scheduler
      "
    volumes:
      - ./platform/airflow/dags:/opt/airflow/dags
    networks:
      - lakehouse-net
    restart: unless-stopped

  # ── Airflow webserver ─────────────────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "${AIRFLOW_PORT:-8888}:8080"
    environment:
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    command: >
      bash -c "
        pip install --quiet apache-airflow-providers-trino apache-airflow-providers-mysql &&
        airflow webserver
      "
    volumes:
      - ./platform/airflow/dags:/opt/airflow/dags
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ── Metabase (BI / dashboarding) ──────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${METABASE_PORT:-3000}:3000"
    environment:
      MB_DB_TYPE: mysql
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 3306
      MB_DB_USER: ${MYSQL_USER}
      MB_DB_PASS: ${MYSQL_PASSWORD}
      MB_DB_HOST: mysql
      JAVA_OPTS: "-Xmx1536m -Xms512m"
    volumes:
      - metabase-data:/metabase-data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
