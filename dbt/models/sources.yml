version: 2

sources:
  - name: bronze
    database: iceberg
    schema: bronze
    description: >
      Bronze landing zone for customer service ticket data.
      All records are append-only and immutable. Source data is written
      directly by the ingest pipeline (pyiceberg bulk write to MinIO).
      EDD section 6.1: source data lives in the bronze namespace.
    tables:
      - name: raw_tickets
        description: >
          Raw customer service ticket records with full fidelity.
          PII fields (usr_id, prblm_name) are present and must be masked or
          hashed before leaving the bronze layer.
        columns:
          - name: prblm_code
            description: >
              Ticket ID. Business primary key. Format: PRB-YYYY-NNNNNNN.
              Not guaranteed unique in raw due to CDC replay; deduplication
              occurs in silver.
          - name: prblm_sysdate
            description: Timestamp when the ticket was created in the source system.
          - name: prblm_updateddate
            description: Timestamp of the most recent update to the ticket.
          - name: prblm_donedate
            description: >
              Timestamp when the ticket was closed/resolved.
              NULL when the ticket is still open.
          - name: prblm_preassignenddate
            description: >
              Timestamp of the first agent response sent to the customer.
              Used to compute first-response SLA compliance.
          - name: prblm_preassignbegindate
            description: >
              Timestamp when the ticket was first dispatched to an agent queue.
          - name: prblm_status_id
            description: >
              Ticket lifecycle status.
              1=開啟 (Open), 2=處理中 (In Progress), 3=待回覆 (Pending Reply),
              4=已回覆 (Replied), 5=結案 (Closed).
          - name: prblm_source_id
            description: >
              Contact channel. 1=Email, 2=Chat, 3=Phone, 4=Portal, 5=App.
          - name: prblm_class_id
            description: Customer-facing category classification. Integer 1–20.
          - name: prblm_intclass_id
            description: Internal service category used by agents. Integer 1–30.
          - name: prblm_perform_id
            description: >
              SLA tier. 1=急件 (Urgent, 8 hr SLA), 2=特急 (Critical, 4 hr SLA),
              NULL=一般 (Standard, 24 hr SLA).
          - name: prblm_complain_id
            description: >
              Complaint escalation level.
              1=一般 (Standard), 2=提升 (Escalated), 3=客訴 (Formal Complaint).
          - name: prblm_processuser
            description: Employee ID of the agent currently assigned.
          - name: prblm_doneuser
            description: Employee ID of the agent who closed the ticket.
          - name: prblm_sysuser
            description: Employee ID of the user who created the ticket.
          - name: usr_id
            description: Member/customer ID. PII — must be hashed (pii_hash) before leaving bronze.
          - name: prblm_name
            description: Customer display name. PII — must be masked (mask_name) before leaving bronze.
          - name: gd_id
            description: Store or shop identifier.
          - name: catsub_id
            description: >
              Product line sub-site ID. Integer 1–10. Links to dim_catsub.
          - name: supplier_id
            description: Supplier identifier for supplier-dispute tickets.
          - name: prblm_doneatatime
            description: TRUE when resolved on first contact.
          - name: prblm_forwarddatetime
            description: Timestamp when forwarded to another team. NULL if never forwarded.
          - name: prblm_forwardtype
            description: Integer code for the forwarded-to team type.
          - name: prblm_notasreason_id
            description: Root cause code for complaint tickets.
          - name: prblm_notasowndept_id
            description: Department ID responsible for the complaint root cause.
          - name: ingested_at
            description: >
              Pipeline ingestion timestamp (set by ingest job).
              Used as the watermark for incremental bronze loads.
