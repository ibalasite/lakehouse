version: 2

models:
  - name: cache_daily_report
    description: >
      Dual-target Lambda Architecture UNION ALL serving MV (EDD §13.2b).
      Batch layer (D-1 and before): from fact_ticket_day_wide.
      Speed layer (today): SUM of fact_ticket_hour_wide.
      Both branches LEFT JOIN all dim tables for zero-JOIN BI queries.
      source_tier column: 'batch' or 'intraday_hourly_sum'.
      Full replace on each run (streaming: every 15 min; daily: 02:00).
      Runs twice per cycle:
        --target prod        → iceberg.cache.cache_daily_report
        --target mysql_cache → mysql.lakehouse_cache.cache_daily_report
      Primary table read by Metabase dashboards.
    config:
      materialized: table
      schema: cache
    columns:
      - name: date_sk
        description: Ticket creation date.
        tests: [not_null]
      - name: source_tier
        description: "'batch' = D-1 fixed; 'intraday_hourly_sum' = today SUM(hour_wide)."
        tests:
          - not_null
          - accepted_values:
              values: [batch, intraday_hourly_sum]
      - name: total_tickets
        description: Ticket count for this date/dimension grain.
        tests: [not_null]
      - name: updated_at
        description: Row freshness timestamp.
        tests: [not_null]

  - name: cache_ticket_daily
    description: >
      Dual-target Cache MV (EDD §13.2b): daily ticket metrics pre-joined with
      all dim tables. Covers the trailing 730 days (2 years). Runs twice per
      daily DAG cycle:
        dbt run --select cache_ticket_daily --target prod        → iceberg.cache
        dbt run --select cache_ticket_daily --target mysql_cache → mysql.lakehouse_cache

      TABLE materialization (full replace) — MySQL lacks native MERGE via
      Trino connector; 730-day window is small enough for a full refresh.

      Schema routing: generate_schema_name macro returns 'cache' for prod target
      (→ iceberg.cache.*) and falls through to target.schema for mysql_cache
      target (→ mysql.lakehouse_cache.*).
    config:
      materialized: table
      schema: cache
    columns:
      - name: date_sk
        description: Ticket creation date (alias of prblm_date). Partition key for MySQL queries.
        tests:
          - not_null
      - name: catsub_id
        description: Product line sub-site code (1–10).
        tests:
          - not_null
      - name: prblm_source_id
        description: Contact channel code (1–5).
        tests:
          - not_null
      - name: prblm_class_id
        description: Customer-facing category code.
        tests:
          - not_null
      - name: prblm_perform_id
        description: SLA tier code. 99 represents standard/一般 tier.
        tests:
          - not_null
      - name: prblm_status_id
        description: Ticket lifecycle status code.
        tests:
          - not_null
      - name: total_tickets
        description: Count of tickets in this group for the day.
        tests:
          - not_null
      - name: resolved_tickets
        description: Count of resolved tickets.
        tests:
          - not_null
      - name: one_shot_resolved
        description: Count of first-contact resolutions.
        tests:
          - not_null
      - name: complain_tickets
        description: Count of escalated complaint tickets.
        tests:
          - not_null
      - name: forwarded_tickets
        description: Count of forwarded tickets.
        tests:
          - not_null
      - name: within_sla_tickets
        description: Count of tickets meeting SLA.
        tests:
          - not_null
      - name: avg_resolution_hours
        description: Average resolution hours. NULL when no valid data.
      - name: avg_response_hours
        description: Average first-response hours. NULL when no valid data.
      - name: pct_resolved
        description: Percentage resolved (0–100). NULL when total=0.
      - name: pct_within_sla
        description: Percentage within SLA (0–100). NULL when total=0.
      - name: pct_one_shot
        description: Percentage first-contact resolved (0–100). NULL when total=0.
      - name: updated_at
        description: Row freshness timestamp from the gold fact table.
        tests:
          - not_null
