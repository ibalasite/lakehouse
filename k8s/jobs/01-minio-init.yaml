---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: lakehouse
  labels:
    app: minio-init
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MinIO health endpoint..."
              until wget -qO- http://minio:9000/minio/health/live >/dev/null 2>&1; do
                echo "MinIO not ready, retrying in 5s..."
                sleep 5
              done
              echo "MinIO is ready."
      containers:
        - name: mc-init
          image: minio/mc:RELEASE.2024-11-21T17-21-54Z
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_ROOT_USER}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_ROOT_PASSWORD}
          command:
            - sh
            - -c
            - |
              set -e
              mc alias set lh http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb --ignore-existing lh/lakehouse
              mc mb --ignore-existing lh/lakehouse/raw
              mc mb --ignore-existing lh/lakehouse/bronze
              mc mb --ignore-existing lh/lakehouse/silver
              mc mb --ignore-existing lh/lakehouse/gold
              mc anonymous set none lh/lakehouse
              echo "MinIO buckets initialised."
          resources:
            requests:
              memory: 64Mi
            limits:
              memory: 128Mi
