---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init
  namespace: lakehouse
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for PostgreSQL..."; sleep 3
              done
              echo "PostgreSQL is up."
      containers:
        - name: pg-init
          image: postgres:15
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POSTGRES_PASSWORD}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POSTGRES_USER}
          command:
            - sh
            - -c
            - |
              set -e
              echo "Creating polaris database if it does not exist..."
              psql -h postgres -U "$POSTGRES_USER" -tc \
                "SELECT 1 FROM pg_database WHERE datname = 'polaris'" \
                | grep -q 1 \
                || psql -h postgres -U "$POSTGRES_USER" -c "CREATE DATABASE polaris"
              echo "PostgreSQL init complete — polaris database ready."
          resources:
            requests:
              memory: 32Mi
            limits:
              memory: 64Mi
