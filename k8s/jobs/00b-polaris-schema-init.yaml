---
# Polaris JDBC persistence bootstrap (AC-02).
# Uses apache/polaris-admin-tool to create polaris_schema DDL + seed the
# initial realm + principal in PostgreSQL so Polaris survives pod restarts.
# Must run AFTER 00-postgres-init (polaris DB exists) and BEFORE polaris.yaml.
apiVersion: batch/v1
kind: Job
metadata:
  name: polaris-schema-init
  namespace: lakehouse
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for PostgreSQL..."; sleep 3
              done
              echo "PostgreSQL is up."
      containers:
        - name: admin-bootstrap
          image: apache/polaris-admin-tool:latest
          imagePullPolicy: IfNotPresent
          args:
            - "bootstrap"
            - "-r"
            - "$(POLARIS_REALM)"
            - "-c"
            - "$(POLARIS_REALM),$(POLARIS_CLIENT_ID),$(POLARIS_CLIENT_SECRET)"
          env:
            - name: POLARIS_REALM
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POLARIS_REALM}
            - name: POLARIS_CLIENT_ID
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POLARIS_CLIENT_ID}
            - name: POLARIS_CLIENT_SECRET
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POLARIS_CLIENT_SECRET}
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POSTGRES_USER}
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POSTGRES_PASSWORD}
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://postgres:5432/polaris"
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 512Mi
