---
apiVersion: batch/v1
kind: Job
metadata:
  name: generate-tickets
  namespace: lakehouse
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 7200
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: clear-s3-location
          image: minio/mc:latest
          command:
            - sh
            - -c
            - |
              mc alias set store http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" --quiet
              mc rm --recursive --force store/lakehouse-local/warehouse/bronze/raw_tickets/ 2>/dev/null || true
              echo "S3 location cleared."
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_ROOT_USER}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_ROOT_PASSWORD}
        - name: purge-polaris-table
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              pip install --quiet requests
              python3 - <<'PYEOF'
              import os, sys, requests

              base = "http://polaris:8183/api/catalog/v1"
              client_id = os.environ["POLARIS_CLIENT_ID"]
              client_secret = os.environ["POLARIS_CLIENT_SECRET"]

              r = requests.post(f"{base}/oauth/tokens",
                  data={"grant_type": "client_credentials",
                        "scope": "PRINCIPAL_ROLE:ALL",
                        "client_id": client_id,
                        "client_secret": client_secret})
              if r.status_code != 200:
                  print(f"OAuth failed: {r.text}")
                  sys.exit(0)
              token = r.json()["access_token"]
              hdrs = {"Authorization": f"Bearer {token}"}

              # Drop table entry without purging S3 files (purgeRequested=false)
              r2 = requests.delete(
                  f"{base}/lakehouse/namespaces/bronze/tables/raw_tickets",
                  params={"purgeRequested": "false"},
                  headers=hdrs)
              if r2.status_code in (200, 204):
                  print("Polaris: bronze.raw_tickets dropped (purgeRequested=false)")
              elif r2.status_code == 404:
                  print("Polaris: bronze.raw_tickets not found — nothing to drop")
              else:
                  print(f"Polaris drop returned {r2.status_code}: {r2.text}")
              PYEOF
          env:
            - name: POLARIS_CLIENT_ID
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POLARIS_CLIENT_ID}
            - name: POLARIS_CLIENT_SECRET
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POLARIS_CLIENT_SECRET}
        - name: wait-polaris
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://polaris:8182/q/health 2>&1 | grep -q "UP\|200\|{"; do
                echo "Waiting for polaris..."; sleep 5
              done
              echo "Polaris ready."
      containers:
        - name: generator
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              pip install --quiet numpy pyarrow "pyiceberg[s3fs]==0.7.1" "boto3==1.34.149"
              python /scripts/04_generate_tickets.py
          env:
            - name: S3_ENDPOINT
              value: http://minio:9000
            - name: MINIO_BUCKET
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_BUCKET}
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_ROOT_USER}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_ROOT_PASSWORD}
            - name: POLARIS_HOST
              value: polaris
            - name: POLARIS_PORT
              value: "8181"
            - name: POLARIS_CLIENT_ID
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POLARIS_CLIENT_ID}
            - name: POLARIS_CLIENT_SECRET
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POLARIS_CLIENT_SECRET}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 1500Mi
      volumes:
        - name: scripts
          configMap:
            name: init-scripts
