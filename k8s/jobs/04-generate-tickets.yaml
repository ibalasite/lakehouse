---
apiVersion: batch/v1
kind: Job
metadata:
  name: generate-tickets
  namespace: lakehouse
spec:
  backoffLimit: 6
  # 10M rows takes ~3 hours at ~1000 rows/sec on a local k3s cluster
  activeDeadlineSeconds: 14400
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: clear-s3-location
          image: minio/mc:latest
          command:
            - sh
            - -c
            - |
              mc alias set store http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" --quiet
              mc rm --recursive --force store/lakehouse/raw/raw_tickets/ 2>/dev/null || true
              echo "S3 location cleared."
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_ROOT_USER}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_ROOT_PASSWORD}
        - name: purge-polaris-table
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              pip install --quiet requests
              python3 - <<'PYEOF'
              import os, sys, requests

              base = "http://polaris:8183/api/catalog/v1"
              client_id = os.environ["POLARIS_CLIENT_ID"]
              client_secret = os.environ["POLARIS_CLIENT_SECRET"]

              r = requests.post(f"{base}/oauth/tokens",
                  data={"grant_type": "client_credentials",
                        "scope": "PRINCIPAL_ROLE:ALL",
                        "client_id": client_id,
                        "client_secret": client_secret})
              if r.status_code != 200:
                  print(f"OAuth failed: {r.text}")
                  sys.exit(0)
              token = r.json()["access_token"]
              hdrs = {"Authorization": f"Bearer {token}"}

              # Force-purge table entry without touching S3 files
              r2 = requests.delete(
                  f"{base}/lakehouse/namespaces/raw/tables/raw_tickets",
                  params={"purgeRequested": "false"},
                  headers=hdrs)
              if r2.status_code in (200, 204):
                  print(f"Polaris: table raw_tickets dropped (purgeRequested=false)")
              elif r2.status_code == 404:
                  print("Polaris: table raw_tickets not found — nothing to drop")
              else:
                  print(f"Polaris drop returned {r2.status_code}: {r2.text}")
              PYEOF
          env:
            - name: POLARIS_CLIENT_ID
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POLARIS_CLIENT_ID}
            - name: POLARIS_CLIENT_SECRET
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POLARIS_CLIENT_SECRET}
        - name: wait-trino
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Trino HTTP..."
              until wget -qO- http://trino:8080/v1/info 2>&1 | grep -q '"starting":false'; do
                echo "Trino not ready yet..."; sleep 10
              done
              echo "Trino ready — warming up S3 DNS (30s)..."
              sleep 30
              echo "Done."
      containers:
        - name: generator
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              pip install --quiet numpy "trino[sqlalchemy]" boto3
              python /scripts/04_generate_tickets.py --host trino --port 8080 --insert-chunk 2500 --batch-size 100000
          env:
            - name: TRINO_HOST
              value: trino
            - name: TRINO_PORT
              value: "8080"
            - name: S3_ENDPOINT
              value: http://minio:9000
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_ROOT_USER}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_ROOT_PASSWORD}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: scripts
          configMap:
            name: init-scripts
