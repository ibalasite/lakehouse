---
apiVersion: batch/v1
kind: Job
metadata:
  name: bulk-silver
  namespace: lakehouse
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 3600
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-trino
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://trino:8080/v1/info 2>&1 | grep -q '"starting":false'; do
                echo "Waiting for Trino to be ready..."; sleep 10
              done
              echo "Trino ready."
      containers:
        - name: loader
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              pip install --quiet "trino==0.326.0"
              python /scripts/07_bulk_silver.py
          env:
            - name: TRINO_HOST
              value: trino
            - name: TRINO_PORT
              value: "8080"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: init-scripts
