---
apiVersion: batch/v1
kind: Job
metadata:
  name: metabase-setup
  namespace: lakehouse
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-metabase
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Metabase..."
              until wget -qO- http://metabase:3000/api/health 2>&1 | grep -q '"status":"ok"'; do
                echo "Metabase not ready yet..."; sleep 10
              done
              echo "Metabase is ready."
      containers:
        - name: setup
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              pip install --quiet requests
              python /scripts/05_metabase_setup.py
          env:
            - name: METABASE_URL
              value: http://metabase:3000
            - name: METABASE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: METABASE_ADMIN_EMAIL}
            - name: METABASE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: METABASE_ADMIN_PASSWORD}
            - name: MYSQL_HOST
              value: mysql
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MYSQL_DATABASE}
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MYSQL_USER}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MYSQL_PASSWORD}
            - name: TRINO_HOST
              value: trino
            - name: TRINO_PORT
              value: "8080"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: init-scripts
