    -- ── 4. Grants (least privilege) ──────────────────────────────────────────────
    -- The lakehouse user was created by MySQL entrypoint via MYSQL_USER /
    -- MYSQL_PASSWORD env vars. We only need to extend its privileges here.
    -- DML only on application cache — no DDL/DROP/ALTER for the app user.
    REVOKE ALL PRIVILEGES ON lakehouse_cache.* FROM 'lakehouse'@'%';
    GRANT SELECT, INSERT, UPDATE, DELETE ON lakehouse_cache.* TO 'lakehouse'@'%';
    -- Metabase requires DDL to create and migrate its own schema tables.
