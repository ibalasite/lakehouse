---
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: lakehouse
data:
  airflow.cfg: |
    [core]
    executor = LocalExecutor
    load_examples = False
    dags_folder = /opt/airflow/dags
    [database]
    sql_alchemy_conn = postgresql+psycopg2://airflow:${POSTGRES_PASSWORD}@postgres:5432/airflow
    [api]
    auth_backends = airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    [webserver]
    base_url = http://localhost:8080
    web_server_master_timeout = 1200
    [logging]
    base_log_folder = /opt/airflow/logs
---
# Airflow init Job — runs db migrate + admin user creation once
apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init
  namespace: lakehouse
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 3; done"]
      containers:
        - name: airflow-init
          image: apache/airflow:2.9.1
          command:
            - bash
            - -c
            - |
              airflow db migrate
              airflow users create \
                --username admin \
                --password "${AIRFLOW_ADMIN_PASSWORD}" \
                --firstname Admin \
                --lastname User \
                --role Admin \
                --email admin@local.com || true
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: AIRFLOW__CORE__FERNET_KEY}
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: AIRFLOW_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: AIRFLOW_ADMIN_PASSWORD}
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      enableServiceLinks: false
      dnsConfig:
        options:
          - name: ndots
            value: "2"
      initContainers:
        - name: wait-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting; sleep 3; done"]
        - name: install-deps
          image: apache/airflow:2.9.1
          command:
            - sh
            - -c
            - |
              python -m pip install --target=/pip-packages --quiet --timeout=120 \
                "numpy==1.26.4" \
                "pandas==2.2.2" \
                "pyarrow==16.1.0" \
                "pyiceberg[s3]==0.7.1" \
                "boto3==1.34.149" \
                "dbt-trino==1.8.0" \
                "dbt-core==1.8.0" \
                "trino==0.328.0" && echo "deps installed OK"
          volumeMounts:
            - name: pip-packages
              mountPath: /pip-packages
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 1Gi
        - name: unpack-dbt
          image: apache/airflow:2.9.1
          command:
            - sh
            - -c
            - |
              python3 -c "
              import os
              bundle = '/dbt-bundle'
              dest = '/opt/airflow/dbt'
              count = 0
              for key in sorted(os.listdir(bundle)):
                  src = os.path.join(bundle, key)
                  if not os.path.isfile(src):
                      continue
                  parts = key.split('__')
                  target = os.path.join(dest, *parts)
                  os.makedirs(os.path.dirname(target), exist_ok=True)
                  with open(src, encoding='utf-8') as fi, open(target, 'w', encoding='utf-8') as fo:
                      fo.write(fi.read())
                  count += 1
              print(f'dbt bundle unpacked: {count} files')
              "
              PATH=/pip-packages/bin:$PATH PYTHONPATH=/pip-packages \
                dbt deps --profiles-dir /opt/airflow/dbt --project-dir /opt/airflow/dbt \
                && echo "dbt deps OK"
          volumeMounts:
            - name: pip-packages
              mountPath: /pip-packages
            - name: dbt-bundle
              mountPath: /dbt-bundle
            - name: dbt
              mountPath: /opt/airflow/dbt
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 256Mi
      containers:
        - name: scheduler
          image: apache/airflow:2.9.1
          command: ["airflow", "scheduler"]
          env:
            - name: TZ
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: TZ}
            - name: AIRFLOW__CORE__DEFAULT_TIMEZONE
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: TZ}
            - name: PYTHONPATH
              value: /pip-packages
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: AIRFLOW__CORE__FERNET_KEY}
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            # Limit to 1 concurrent task — all tasks run as forked processes in
            # this pod; running dbt (Trino) concurrently causes OOMKill.
            - name: AIRFLOW__CORE__PARALLELISM
              value: "2"
            - name: AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG
              value: "2"
            - name: TRINO_HOST
              value: trino
            - name: TRINO_PORT
              value: "8080"
            - name: MYSQL_HOST
              value: mysql
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MYSQL_USER}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MYSQL_PASSWORD}
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MYSQL_DATABASE}
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MYSQL_ROOT_PASSWORD}
            - name: METABASE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: METABASE_ADMIN_EMAIL}
            - name: METABASE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: METABASE_ADMIN_PASSWORD}
            # ── Streaming pipeline credentials ─────────────────────────────────
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_ROOT_USER}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_ROOT_PASSWORD}
            - name: POLARIS_CLIENT_ID
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POLARIS_CLIENT_ID}
            - name: POLARIS_CLIENT_SECRET
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: POLARIS_CLIENT_SECRET}
            - name: MINIO_BUCKET
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MINIO_BUCKET}
            - name: S3_ENDPOINT
              value: "http://minio:9000"
            - name: POLARIS_HOST
              value: polaris
            - name: POLARIS_PORT
              value: "8181"
            - name: DATA_SOURCE_URL
              value: "http://datasource:8080"
          volumeMounts:
            # Use subPath to avoid ConfigMap symlink recursive-loop in Airflow's DAG scanner
            - name: dags
              mountPath: /opt/airflow/dags/pipeline_daily.py
              subPath: pipeline_daily.py
            - name: dags
              mountPath: /opt/airflow/dags/pipeline_backfill.py
              subPath: pipeline_backfill.py
            - name: dags
              mountPath: /opt/airflow/dags/pipeline_hourly.py
              subPath: pipeline_hourly.py
            - name: dags
              mountPath: /opt/airflow/dags/pipeline_streaming.py
              subPath: pipeline_streaming.py
            - name: scripts
              mountPath: /opt/airflow/scripts/fetch_and_ingest.py
              subPath: fetch_and_ingest.py
            - name: scripts
              mountPath: /opt/airflow/scripts/populate_mysql_cache.py
              subPath: populate_mysql_cache.py
            - name: pip-packages
              mountPath: /pip-packages
            - name: dbt
              mountPath: /opt/airflow/dbt
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: dags
          configMap:
            name: airflow-dags
        - name: scripts
          configMap:
            name: airflow-scripts
        - name: pip-packages
          emptyDir: {}
        - name: dbt
          emptyDir: {}
        - name: dbt-bundle
          configMap:
            name: dbt-bundle
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting; sleep 3; done"]
      containers:
        - name: webserver
          image: apache/airflow:2.9.1
          command: ["airflow", "webserver", "--worker-timeout", "600"]
          env:
            - name: TZ
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: TZ}
            - name: AIRFLOW__CORE__DEFAULT_TIMEZONE
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: TZ}
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: AIRFLOW__CORE__FERNET_KEY}
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: AIRFLOW__WEBSERVER__BASE_URL
              value: http://localhost:8080
            - name: AIRFLOW__WEBSERVER__WORKERS
              value: "1"
            - name: AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL
              value: "0"
            - name: AIRFLOW__WEBSERVER__WORKER_TIMEOUT
              value: "600"
            - name: AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT
              value: "1200"
            - name: AIRFLOW__API__AUTH_BACKENDS
              value: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 20
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: lakehouse
spec:
  selector:
    app: airflow-webserver
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-nodeport
  namespace: lakehouse
spec:
  type: NodePort
  selector:
    app: airflow-webserver
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30888
