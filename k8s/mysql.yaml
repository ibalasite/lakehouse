---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MYSQL_ROOT_PASSWORD}
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MYSQL_DATABASE}
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MYSQL_USER}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef: {name: lakehouse-secrets, key: MYSQL_PASSWORD}
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$(MYSQL_ROOT_PASSWORD)"]
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$(MYSQL_ROOT_PASSWORD)"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql-data
        - name: initdb
          configMap:
            name: mysql-initdb
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: lakehouse
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
