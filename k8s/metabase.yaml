---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: lakehouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metabase
  template:
    metadata:
      labels:
        app: metabase
    spec:
      containers:
        - name: metabase
          image: metabase/metabase:latest
          env:
            - name: MB_DB_FILE
              value: /metabase-data/metabase.db
            - name: JAVA_OPTS
              value: "-Xmx1536m -Xms256m"
          ports:
            - containerPort: 3000
              name: http
          volumeMounts:
            - name: data
              mountPath: /metabase-data
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 1200
            periodSeconds: 60
            failureThreshold: 5
          resources:
            requests:
              memory: 768Mi
            limits:
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: metabase-data
---
apiVersion: v1
kind: Service
metadata:
  name: metabase
  namespace: lakehouse
spec:
  selector:
    app: metabase
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: metabase-nodeport
  namespace: lakehouse
spec:
  type: NodePort
  selector:
    app: metabase
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
