apiVersion: v1
kind: ConfigMap
metadata:
  name: polaris-config
  namespace: lakehouse
data:
  application.properties: |
    polaris.features.defaults.ENFORCE_SCOPED_TOKENS=false
    polaris.features.defaults.DROP_WITH_PURGE_ENABLED=true
    quarkus.http.port=8181
    quarkus.management.port=8182
    # Direct MinIO access for Polaris's own S3 I/O (metadata writing, not STS).
    # Use full Kubernetes FQDN (not short name or ClusterIP):
    #   - ClusterIP stales on every --rebuild
    #   - Short name 'minio' fails under ndots:5 + corporate DNS search domain (Netty bug)
    #   - FQDN bypasses ndots and is stable — same approach as configmap-trino.yaml
    polaris.io.s3.endpoint=http://minio.lakehouse.svc.cluster.local:9000
    polaris.io.s3.path-style-access=true
    polaris.io.s3.region=us-east-1
    # Quarkus S3 extension: override endpoint for catalog metadata writes
    quarkus.s3.endpoint-override=http://minio.lakehouse.svc.cluster.local:9000
    quarkus.s3.force-path-style=true
    quarkus.s3.aws.region=us-east-1
