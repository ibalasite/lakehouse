# ── Iceberg REST catalog via Apache Polaris ────────────────────────────────
# SECURITY NOTE: The Polaris URIs below use HTTP because all communication
# occurs over the internal Docker bridge network (lakehouse-net). Traffic
# never leaves the host machine. For any deployment reachable over a real
# network, replace http:// with https:// and configure TLS on Polaris.
# Credentials are read from environment variables injected by Docker Compose
# (POLARIS_CLIENT_ID / POLARIS_CLIENT_SECRET from .env — never hard-coded).

connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://polaris:8181/api/catalog/v1/
iceberg.rest-catalog.warehouse=lakehouse
iceberg.rest-catalog.security=oauth2
iceberg.rest-catalog.oauth2.server-uri=http://polaris:8181/api/catalog/v1/oauth/tokens
iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_CLIENT_ID}:${ENV:POLARIS_CLIENT_SECRET}
iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL
iceberg.rest-catalog.vended-credentials-enabled=true
iceberg.rest-catalog.s3.path-style-access=true
