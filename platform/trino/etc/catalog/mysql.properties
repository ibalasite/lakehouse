# ── MySQL connector for Trino ──────────────────────────────────────────────
# SECURITY NOTE: Credentials are injected at runtime via environment variables
# (MYSQL_USER / MYSQL_PASSWORD from .env). The connection string uses the
# internal Docker bridge hostname "mysql" — traffic stays on lakehouse-net.
# For a network-exposed deployment add &useSSL=true&requireSSL=true to the URL
# and configure MySQL server-side TLS certificates.

connector.name=mysql
connection-url=jdbc:mysql://mysql:3306?serverTimezone=UTC&characterEncoding=utf8mb4
connection-user=${ENV:MYSQL_USER}
connection-password=${ENV:MYSQL_PASSWORD}
