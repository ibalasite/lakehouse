# ── Trino coordinator configuration (local dev stack) ─────────────────────
# NOTE: discovery.uri uses HTTP because this stack is local-only (localhost).
#       For any network-exposed deployment, switch to HTTPS and add TLS certs.
# NOTE: coordinator+worker on the same node is intentional for a single-machine
#       dev lakehouse. For production, separate coordinator and worker nodes.

coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080

# ── Memory limits ──────────────────────────────────────────────────────────
query.max-memory=2GB
query.max-memory-per-node=1500MB
query.max-total-memory-per-node=2GB

# ── Query safety timeouts ──────────────────────────────────────────────────
# Prevent runaway queries from consuming resources indefinitely.
query.max-execution-time=30m
query.max-run-time=60m

# ── Internal discovery (localhost-only — see NOTE above) ───────────────────
discovery.uri=http://localhost:8080
